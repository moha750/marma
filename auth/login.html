<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - مَرْمى</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon"><i data-lucide="goal"></i></div>
        <h1>تسجيل الدخول</h1>
        <p class="subtitle">أهلاً بعودتك! ادخل بياناتك للوصول إلى ملعبك</p>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">البريد الإلكتروني <span class="required">*</span></label>
          <input type="email" class="form-control" id="email" name="email" required autofocus autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">كلمة المرور <span class="required">*</span></label>
          <input type="password" class="form-control" id="password" name="password" required minlength="6" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="submit-btn">
          <span class="btn-text">تسجيل الدخول</span>
        </button>
      </form>

      <div class="auth-footer">
        ليس لديك حساب؟ <a href="/auth/signup">أنشئ حساباً جديداً</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../src/core/supabase-client.js"></script>
  <script src="../src/core/utils.js"></script>
  <script src="../src/core/auth.js"></script>
  <script>
    window.utils.renderIcons();
    // إذا كان مسجلاً بالفعل، نوجّه حسب نوع الحساب (super-admin أو عميل عادي)
    (async () => {
      await window.auth.redirectIfAuthenticated();
    })();

    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = form.email.value.trim();
      const password = form.password.value;
      submitBtn.disabled = true;
      submitBtn.querySelector('.btn-text').textContent = 'جارٍ الدخول...';

      try {
        const { error } = await window.sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const dest = await window.auth.getPostLoginDestination();
        if (dest) {
          window.location.replace(dest);
        } else {
          await window.sb.auth.signOut();
          window.utils.toast('حسابك غير مرتبط بأي ملعب', 'error');
          submitBtn.disabled = false;
          submitBtn.querySelector('.btn-text').textContent = 'تسجيل الدخول';
        }
      } catch (err) {
        window.utils.toast(window.utils.formatError(err), 'error');
        submitBtn.disabled = false;
        submitBtn.querySelector('.btn-text').textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
